<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz-App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="quiz-box">
            <div class="header">
                <h2>🧠 Quiz App</h2>
                <div class="progress">
                    Question  <span id="current">1</span>/<span id="total">3</span>
                </div>
            </div>
            <div id="question">Loading...</div>
            <div id="options"></div>
            
            <div class="footer">
                <button id="next-btn" >Next</button>
                <div id="result" class="result-hidden">
                    <h3>Your Score:<span id="score"></span></h3>
                    <button id="restart" class="btn">Restart Quiz</button>
                </div>
            </div>
            <div class="circle" id="circle-id">
                <svg width="150" height="150" >
                    <circle cx="75" cy="75" r="65"class=outer ></circle>
                    <circle cx="75" cy="75" r="65" id="inner" class="inner"></circle>
                </svg>
                <div class="percentage" id="percent">0%</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
